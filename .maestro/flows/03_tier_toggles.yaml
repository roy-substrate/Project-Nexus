# Flow 03: Tier 1 & Tier 2 Toggle Control
# Tests that both protection layers can be independently toggled.
# Tier 1 = Acoustic masking (psychoacoustic). Tier 2 = Adversarial ML (UAP).
# Both must be controllable for the hypothesis to hold — users need to
# verify that EACH tier contributes to blocking AI transcription.

appId: com.nexus.shield
name: "Shield — Tier Toggle Control"
tags:
  - shield
  - tiers
  - hypothesis

---

# ── Navigate to Shield tab ───────────────────────────────────────
- tapOn: "Shield"
- assertVisible: "Shield offline"

# ── Verify both tier buttons are visible ─────────────────────────
- assertVisible: "Acoustic"
- assertVisible: "Tier 1"
- assertVisible: "Adversarial"
- assertVisible: "Tier 2"

# ── Toggle Tier 1 OFF ───────────────────────────────────────────
- tapOn: "Acoustic"
# The mini toggle pill should animate to disabled state
- waitForAnimationToEnd

# ── Toggle Tier 2 OFF ───────────────────────────────────────────
- tapOn: "Adversarial"
- waitForAnimationToEnd

# ── Toggle Tier 1 back ON ───────────────────────────────────────
- tapOn: "Acoustic"
- waitForAnimationToEnd

# ── Toggle Tier 2 back ON ───────────────────────────────────────
- tapOn: "Adversarial"
- waitForAnimationToEnd

# ── Activate shield with both tiers ON ──────────────────────────
- tapOn: "Activate shield"
- extendedWaitUntil:
    visible: "Shield active"
    timeout: 3000

# With both tiers on, techniques count should be > 0
- assertVisible:
    text: "technique"
    optional: true

# ── Disable Tier 2 while shield is active ───────────────────────
- tapOn: "Adversarial"
- waitForAnimationToEnd
# Shield should remain active but technique count may decrease

# ── Re-enable Tier 2 ────────────────────────────────────────────
- tapOn: "Adversarial"
- waitForAnimationToEnd

# ── Deactivate shield ───────────────────────────────────────────
- tapOn: "Deactivate shield"
- extendedWaitUntil:
    visible: "Shield offline"
    timeout: 3000
